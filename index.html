<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSE Test - Server-Sent Events</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .content {
      padding: 40px;
    }

    .control-section {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 150px;
      padding: 15px 30px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-start {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-reset {
      background: #e0e0e0;
      color: #333;
    }

    .btn-reset:hover:not(:disabled) {
      background: #d0d0d0;
    }

    .progress-section {
      margin-bottom: 30px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.95em;
      font-weight: 500;
      color: #333;
    }

    .progress-bar {
      background: #e0e0e0;
      border-radius: 10px;
      height: 25px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.85em;
    }

    .status-message {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }

    .status-message.show {
      display: block;
    }

    .status-message.info {
      background: #e3f2fd;
      color: #1976d2;
      border-left: 4px solid #1976d2;
    }

    .status-message.success {
      background: #e8f5e9;
      color: #388e3c;
      border-left: 4px solid #388e3c;
    }

    .status-message.error {
      background: #ffebee;
      color: #d32f2f;
      border-left: 4px solid #d32f2f;
    }

    .log-section {
      margin-top: 30px;
    }

    .log-title {
      font-size: 1.1em;
      font-weight: 600;
      margin-bottom: 15px;
      color: #333;
    }

    .log-container {
      background: #f5f5f5;
      border-radius: 10px;
      height: 300px;
      overflow-y: auto;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .log-entry {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 5px;
      background: white;
      border-left: 3px solid;
    }

    .log-entry.inicio {
      border-left-color: #4caf50;
      color: #2e7d32;
    }

    .log-entry.requisicao_inicio {
      border-left-color: #2196f3;
      color: #1565c0;
    }

    .log-entry.requisicao_completa {
      border-left-color: #00bcd4;
      color: #00838f;
    }

    .log-entry.processando {
      border-left-color: #ff9800;
      color: #e65100;
    }

    .log-entry.concluido {
      border-left-color: #9c27b0;
      color: #6a1b9a;
    }

    .log-entry.error {
      border-left-color: #f44336;
      color: #c62828;
    }

    .log-entry-time {
      opacity: 0.6;
      font-size: 0.85em;
      margin-right: 10px;
    }

    .results-section {
      margin-top: 30px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 10px;
      display: none;
    }

    .results-section.show {
      display: block;
    }

    .results-title {
      font-size: 1.1em;
      font-weight: 600;
      margin-bottom: 15px;
      color: #333;
    }

    .results-content {
      background: white;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
    }

    .results-content pre {
      margin: 0;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      line-height: 1.5;
      color: #333;
    }

    .empty-log {
      color: #999;
      text-align: center;
      padding: 40px 20px;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #764ba2;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8em;
      }

      .content {
        padding: 20px;
      }

      .control-section {
        flex-direction: column;
      }

      button {
        min-width: 100%;
      }

      .log-container {
        height: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 Server-Sent Events Tester</h1>
      <p>Teste requisições assíncronas em tempo real</p>
    </div>

    <div class="content">
      <div class="control-section">
        <button class="btn-start" id="startBtn">Iniciar Processamento</button>
        <button class="btn-reset" id="resetBtn">Limpar</button>
      </div>

      <div class="status-message info" id="statusMessage"></div>

      <div class="progress-section">
        <div class="progress-label">
          <span>Progresso do Processamento</span>
          <span id="percentageText">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%">
            <span id="progressText"></span>
          </div>
        </div>
      </div>

      <div class="log-section">
        <div class="log-title">📋 Log de Eventos</div>
        <div class="log-container" id="logContainer">
          <div class="empty-log">Clique em "Iniciar Processamento" para começar</div>
        </div>
      </div>

      <div class="results-section" id="resultsSection">
        <div class="results-title">📊 Resultados Finais</div>
        <div class="results-content">
          <pre id="resultsContent"></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const logContainer = document.getElementById('logContainer');
    const progressFill = document.getElementById('progressFill');
    const percentageText = document.getElementById('percentageText');
    const progressText = document.getElementById('progressText');
    const statusMessage = document.getElementById('statusMessage');
    const resultsSection = document.getElementById('resultsSection');
    const resultsContent = document.getElementById('resultsContent');

    let eventSource = null;
    let isProcessing = false;
    let processCompleted = false;

    const emojiMap = {
      inicio: '🟢',
      requisicao_inicio: '🔵',
      requisicao_completa: '✅',
      processando: '⚙️',
      concluido: '🏁',
      error: '❌'
    };

    function formatTimestamp() {
      const now = new Date();
      return now.toLocaleTimeString('pt-BR', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function addLogEntry(event, message, data = null) {
      if (logContainer.querySelector('.empty-log')) {
        logContainer.innerHTML = '';
      }

      const entry = document.createElement('div');
      entry.className = `log-entry ${event}`;

      let content = `<span class="log-entry-time">[${formatTimestamp()}]</span>`;
      content += `<span>${emojiMap[event] || '•'} ${message}</span>`;

      if (data) {
        content += `<br><span class="log-entry-time">└─ ${JSON.stringify(data)}</span>`;
      }

      entry.innerHTML = content;
      logContainer.appendChild(entry);
      logContainer.scrollTop = logContainer.scrollHeight;
    }

    function updateProgress(progresso) {
      progressFill.style.width = progresso + '%';
      percentageText.textContent = progresso + '%';
      progressText.textContent = progresso > 10 ? progresso + '%' : '';
    }

    function showStatus(message, type = 'info') {
      statusMessage.className = `status-message show ${type}`;
      statusMessage.textContent = message;
    }

    function hideStatus() {
      statusMessage.classList.remove('show');
    }

    function reset() {
      logContainer.innerHTML = '<div class="empty-log">Clique em "Iniciar Processamento" para começar</div>';
      updateProgress(0);
      hideStatus();
      resultsSection.classList.remove('show');
      resultsContent.innerHTML = '';
      isProcessing = false;
      processCompleted = false;
      startBtn.disabled = false;
    }

    function startProcessing() {
      if (isProcessing) return;

      reset();
      isProcessing = true;
      startBtn.disabled = true;
      showStatus('Conectando ao servidor SSE...', 'info');

      console.log('🔗 Conectando a: /api/processar');
      eventSource = new EventSource('/api/processar');

      eventSource.addEventListener('inicio', (event) => {
        const data = JSON.parse(event.data);
        addLogEntry('inicio', data.mensagem);
        updateProgress(data.progresso);
      });

      eventSource.addEventListener('requisicao_inicio', (event) => {
        const data = JSON.parse(event.data);
        addLogEntry('requisicao_inicio', data.mensagem);
        updateProgress(data.progresso);
      });

      eventSource.addEventListener('requisicao_completa', (event) => {
        const data = JSON.parse(event.data);
        addLogEntry('requisicao_completa', data.mensagem, data.dados);
        updateProgress(data.progresso);
      });

      eventSource.addEventListener('processando', (event) => {
        const data = JSON.parse(event.data);
        addLogEntry('processando', data.mensagem);
        updateProgress(data.progresso);
      });

      eventSource.addEventListener('concluido', (event) => {
        const data = JSON.parse(event.data);
        addLogEntry('concluido', data.mensagem);
        updateProgress(data.progresso);
        showStatus('✨ Processamento concluído com sucesso!', 'success');

        // Mostra resultados
        resultsSection.classList.add('show');
        resultsContent.textContent = JSON.stringify(data.resultados, null, 2);

        processCompleted = true;
        isProcessing = false;
        startBtn.disabled = false;

        // Aguarda um pouco antes de fechar para garantir que tudo foi processado
        setTimeout(() => {
          eventSource.close();
          console.log('✅ EventSource fechado normalmente');
        }, 100);
      });

      eventSource.addEventListener('error', (event) => {
        // Se processamento foi concluído com sucesso, ignorar o erro (é apenas o fechamento da conexão)
        if (processCompleted) {
          console.log('ℹ️ Conexão fechada após conclusão');
          return;
        }

        // Se ainda está processando e recebe erro, mostrar a mensagem
        if (isProcessing) {
          console.error('❌ Erro na conexão SSE:', {
            readyState: eventSource.readyState,
            estado: eventSource.readyState === 0 ? 'CONNECTING' : eventSource.readyState === 1 ? 'OPEN' : 'CLOSED'
          });
          showStatus('❌ Erro ao conectar com o servidor', 'error');
          addLogEntry('error', 'Erro de conexão SSE');
          isProcessing = false;
          startBtn.disabled = false;
        }
        eventSource.close();
      });
    }

    startBtn.addEventListener('click', startProcessing);
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
